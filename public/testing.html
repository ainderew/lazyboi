<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Testing Automation Login - Loading</title>
    <style>
      body {
        background-color: #0f172a;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        color: #f1f5f9;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }

      .loader {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .loader .dot {
        width: 15px;
        height: 15px;
        background-color: #38bdf8;
        border-radius: 50%;
        animation: bounce 1.4s infinite ease-in-out both;
      }

      .loader .dot:nth-child(2) {
        animation-delay: 0.2s;
      }

      .loader .dot:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: scale(0);
        }
        40% {
          transform: scale(1);
        }
      }

      .message {
        margin-top: 20px;
        font-size: 1.5rem;
        letter-spacing: 1px;
        color: #e2e8f0;
        animation: fadeIn 2s ease-in forwards;
        opacity: 0;
      }

      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="loader">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <div class="message">Testing Automation Login...</div>
  </body>
</html>
