<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 64 64">

  <defs>
    <linearGradient id="shirtGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffb74d"/>
      <stop offset="100%" stop-color="#ff9800"/>
    </linearGradient>

    <linearGradient id="pantGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#90caf9"/>
      <stop offset="100%" stop-color="#42a5f5"/>
    </linearGradient>

    <linearGradient id="packGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#c5e1a5"/>
      <stop offset="100%" stop-color="#8bc34a"/>
    </linearGradient>
  </defs>

  <!-- thick outline style -->
  <g id="hiker" fill="none" stroke="#3e2723" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">

    <!-- head -->
    <circle cx="32" cy="12" r="7" fill="#ffecb3"/>

    <!-- body / shirt -->
    <path d="M32 19 L32 38" stroke="url(#shirtGrad)"/>

    <!-- left arm -->
    <path d="M32 24 L20 30" stroke="url(#shirtGrad)"/>
    <!-- hiking pole -->
    <path d="M20 30 L20 54" stroke="#8d6e63" stroke-width="4"/>

    <!-- right arm (behind body for depth) -->
    <path d="M32 24 L43 32" stroke="url(#shirtGrad)" stroke-opacity="0.6"/>

    <!-- legs -->
    <path d="M32 38 L24 56" stroke="url(#pantGrad)"/>
    <path d="M32 38 L40 56" stroke="url(#pantGrad)"/>

    <!-- backpack -->
    <rect x="26" y="20" width="14" height="16" rx="3" fill="url(#packGrad)" stroke="none"/>

    <!-- tiny shadow under feet for grounding -->
    <ellipse cx="32" cy="58" rx="12" ry="3" fill="#000" opacity="0.1" stroke="none"/>
  </g>
</svg>
