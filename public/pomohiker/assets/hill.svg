<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1200 600">

  <defs>
    <!-- blue-sky gradient -->
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#7fd3ff"/>
      <stop offset="60%" stop-color="#cfe9ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>

    <!-- gentle sun -->
    <radialGradient id="sunGrad" cx="0.75" cy="0.15" r="0.25">
      <stop offset="0%"  stop-color="#fff7d1"/>
      <stop offset="70%" stop-color="#ffe066"/>
      <stop offset="100%" stop-color="#ffc107" stop-opacity="0"/>
    </radialGradient>

    <!-- hazy distant mountains -->
    <linearGradient id="mountGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#c3cbe7"/>
      <stop offset="100%" stop-color="#9ba6c8"/>
    </linearGradient>

    <!-- lush foreground hill -->
    <linearGradient id="hillGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#9dd85c"/>
      <stop offset="100%" stop-color="#5ea433"/>
    </linearGradient>

    <!-- soft drop shadow for foreground elements -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feOffset dy="4" result="offset"/>
      <feComposite in="offset" in2="SourceAlpha" operator="out" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="600" fill="url(#skyGrad)"/>

  <!-- Sun glow -->
  <rect width="1200" height="600" fill="url(#sunGrad)" />

  <!-- distant mountain range -->
  <path d="M0 380 L120 320 L240 360 L360 310 L480 330 L600 300 L720 340 L840 290 L960 310 L1080 280 L1200 295 L1200 600 L0 600 Z"
        fill="url(#mountGrad)" opacity="0.8"/>

  <g filter="url(#softShadow)">
    <path d="M0 550 L300 350 L600 400 L900 200 L1200 100 L1200 600 L0 600 Z"
          fill="url(#hillGrad)"/>
  </g>

  <path id="trail"
        d="M0 550 L300 350 L600 400 L900 200 L1200 100"
        fill="none"
        stroke="transparent"
        stroke-width="10"/>
</svg>
