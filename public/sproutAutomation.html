<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>lazyboi — still garden</title>
    <link rel="stylesheet" href="/css/sproutAutomation.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Flash-prevent theme: apply before paint
      (function () {
        const stored = localStorage.getItem('theme');
        const sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const theme = stored || (sysDark ? 'dark' : 'light');
        document.documentElement.dataset.theme = theme;
      })();
    </script>
  </head>
  <body>
    <main class="page">
      <header class="masthead">
        <div class="mark">
          <span class="mark__dot" aria-hidden="true"></span>
          <span class="mark__name">lazyboi</span>
          <span class="mark__sep" aria-hidden="true">·</span>
          <span class="mark__sub">still garden</span>
        </div>

        <button
          class="theme-toggle"
          type="button"
          aria-label="Toggle theme"
          data-theme-toggle
        >
          <span class="theme-toggle__label" data-theme-label>auto</span>
        </button>
      </header>

      <section class="hero">
        <p class="hero__kicker">
          <span class="hero__kicker-dot" aria-hidden="true"></span>
          <span data-cron-phrase>everything is calm.</span>
        </p>

        <h1 class="hero__headline">
          The garden<br />
          <em>tends</em> itself.
        </h1>

        <p class="hero__caption">
          A quiet place where time is kept on your behalf.
        </p>
      </section>

      <section class="stage" aria-label="Next scheduled event">
        <figure class="dial">
          <svg
            class="dial__svg"
            viewBox="0 0 400 240"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <defs>
              <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="var(--arc-start)" />
                <stop offset="100%" stop-color="var(--arc-end)" />
              </linearGradient>
              <radialGradient id="pebbleGlow" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="var(--pebble-glow)" stop-opacity="0.6" />
                <stop offset="100%" stop-color="var(--pebble-glow)" stop-opacity="0" />
              </radialGradient>
              <filter id="soften" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="0.4" />
              </filter>
            </defs>

            <!-- ground line -->
            <line
              x1="20"
              y1="220"
              x2="380"
              y2="220"
              stroke="var(--hairline)"
              stroke-width="1"
              stroke-dasharray="2 6"
            />

            <!-- ghost arc (full path) -->
            <path
              class="dial__track"
              d="M 40 220 A 160 160 0 0 1 360 220"
              fill="none"
              stroke="var(--track)"
              stroke-width="1.5"
              stroke-linecap="round"
            />

            <!-- progress arc -->
            <path
              class="dial__arc"
              d="M 40 220 A 160 160 0 0 1 360 220"
              fill="none"
              stroke="url(#arcGrad)"
              stroke-width="2.5"
              stroke-linecap="round"
              pathLength="1"
              stroke-dasharray="1"
              stroke-dashoffset="1"
              filter="url(#soften)"
            />

            <!-- start marker -->
            <circle cx="40" cy="220" r="3" fill="var(--tick)" />
            <!-- end marker -->
            <circle cx="360" cy="220" r="3" fill="var(--tick)" />

            <!-- pebble glow -->
            <circle
              class="dial__pebble-glow"
              cx="40"
              cy="220"
              r="24"
              fill="url(#pebbleGlow)"
            />
            <!-- pebble -->
            <circle
              class="dial__pebble"
              cx="40"
              cy="220"
              r="7"
              fill="var(--pebble)"
            />
            <circle
              class="dial__pebble-inner"
              cx="40"
              cy="220"
              r="2.5"
              fill="var(--pebble-inner)"
            />
          </svg>

          <figcaption class="dial__caption">
            <span class="dial__label" data-dial-label>next</span>
            <span class="dial__phrase" data-dial-phrase>listening…</span>
            <span class="dial__precise" data-dial-precise>—</span>
          </figcaption>
        </figure>

        <aside class="facts">
          <dl class="facts__list">
            <div class="facts__row">
              <dt>automation</dt>
              <dd data-cron-state>checking…</dd>
            </div>
            <div class="facts__row">
              <dt>window</dt>
              <dd>
                <span class="pill pill--in">in</span> 21:00 · mon–fri<br />
                <span class="pill pill--out">out</span> 06:00 · tue–sat
              </dd>
            </div>
            <div class="facts__row">
              <dt>drift</dt>
              <dd>+ up to 30 min · random</dd>
            </div>
            <div class="facts__row">
              <dt>last tended</dt>
              <dd data-last-tended>—</dd>
            </div>
          </dl>
        </aside>
      </section>

      <section class="ledger" aria-label="Recent entries">
        <header class="ledger__head">
          <h2 class="ledger__title">Recent entries</h2>
          <span class="ledger__meta" data-ledger-count></span>
        </header>

        <ol class="ledger__list" data-ledger>
          <li class="ledger__placeholder">
            <span class="shimmer"></span>
            <span class="shimmer"></span>
            <span class="shimmer"></span>
          </li>
        </ol>
      </section>

      <footer class="foot">
        <span>tended by a small dragon.</span>
        <span data-now></span>
      </footer>
    </main>

    <script type="module" src="/js/sproutAutomation.js"></script>
  </body>
</html>
