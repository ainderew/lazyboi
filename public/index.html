<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>lazyboi</title>
    <link rel="stylesheet" href="/css/index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        const stored = localStorage.getItem('theme');
        const sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.dataset.theme = stored || (sysDark ? 'dark' : 'light');
      })();
    </script>
  </head>
  <body>
    <div class="page">
      <header class="masthead">
        <span class="masthead__name">lazyboi</span>
        <span class="masthead__rule" aria-hidden="true"></span>
        <span class="masthead__date" data-today>—</span>
        <span class="masthead__rule" aria-hidden="true"></span>
        <span class="masthead__clock tabular" data-now>—:—</span>

        <nav class="masthead__nav">
          <button class="link" type="button" data-clock-toggle>
            <span data-clock-label>24h</span>
          </button>
          <button class="link" type="button" data-theme-toggle>
            <span data-theme-label>auto</span>
          </button>
        </nav>
      </header>

      <section class="lede">
        <p class="lede__kicker" data-status-kicker>quality check</p>
        <h1 class="lede__headline" data-headline>
          <span class="lede__placeholder">listening for telemetry</span>
        </h1>
        <p class="lede__sub" data-subline></p>
      </section>

      <section class="next">
        <p class="meta">next fire</p>
        <p class="next__line">
          <span class="next__when tabular" data-next-when>—</span>
          <span class="next__sep">·</span>
          <span class="next__what" data-next-what>—</span>
        </p>
        <p class="next__hint" data-next-hint></p>
      </section>

      <section class="record">
        <header class="record__head">
          <p class="meta">recent activity</p>
          <p class="record__count"><span data-record-count>—</span> entries</p>
        </header>

        <ol class="record__list" data-ledger>
          <li class="record__placeholder">no entries on record</li>
        </ol>
      </section>

      <footer class="colophon">
        <p>everything stays on this machine. sqlite for records, files for logs and screenshots. no remote db, no analytics.</p>
        <p class="colophon__build">v0.0.4 · beta</p>
      </footer>
    </div>

    <script type="module" src="/js/index.js"></script>
  </body>
</html>
