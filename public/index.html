<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>lazyboi</title>
    <link rel="stylesheet" href="/css/index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        const stored = localStorage.getItem('theme');
        const sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.dataset.theme = stored || (sysDark ? 'dark' : 'light');
      })();
    </script>
  </head>
  <body>
    <main class="page">
      <header class="top">
        <div class="top__brand">
          <span class="top__mark" aria-hidden="true"></span>
          <span class="top__name">lazyboi</span>
        </div>
        <button class="top__theme" type="button" data-theme-toggle>
          <span data-theme-label>auto</span>
        </button>
      </header>

      <section class="hero" data-hero>
        <div class="hero__top">
          <span class="hero__badge">
            <span class="dot" aria-hidden="true"></span>
            <span data-hero-badge>checking</span>
          </span>
          <span class="hero__sync tabular" data-sync>—</span>
        </div>
        <h1 class="hero__line" data-hero-line>checking…</h1>
        <p class="hero__sub" data-hero-sub>—</p>

        <div class="countdown" data-countdown hidden>
          <div class="countdown__head">
            <span class="countdown__label">next run in</span>
            <span class="countdown__when" data-cd-when>—</span>
          </div>
          <div class="countdown__time tabular" data-cd-time>—:—:—</div>
          <div class="countdown__bar" aria-hidden="true">
            <div class="countdown__fill" data-cd-fill style="--p: 0%"></div>
          </div>
        </div>
      </section>

      <section class="cards">
        <article class="card" data-track="in">
          <header class="card__head">
            <h2 class="card__name">clock in</h2>
            <span class="card__pip" data-pip></span>
          </header>
          <p class="card__status" data-status>—</p>
          <dl class="card__meta">
            <div><dt>last</dt><dd data-last>—</dd></div>
            <div><dt>next</dt><dd data-next>—</dd></div>
          </dl>
          <div class="spark" data-spark aria-label="last 14 runs"></div>
        </article>

        <article class="card" data-track="out">
          <header class="card__head">
            <h2 class="card__name">clock out</h2>
            <span class="card__pip" data-pip></span>
          </header>
          <p class="card__status" data-status>—</p>
          <dl class="card__meta">
            <div><dt>last</dt><dd data-last>—</dd></div>
            <div><dt>next</dt><dd data-next>—</dd></div>
          </dl>
          <div class="spark" data-spark aria-label="last 14 runs"></div>
        </article>
      </section>

      <section class="recent">
        <header class="recent__head">
          <h2>recent runs</h2>
          <button class="recent__refresh" type="button" data-refresh>
            <span class="recent__refresh-icon" aria-hidden="true">↻</span>
            <span>refresh</span>
          </button>
        </header>
        <ol class="recent__list" data-list>
          <li class="recent__empty">no runs yet</li>
        </ol>
      </section>

      <footer class="foot">
        <span>local only · sqlite</span>
        <span class="tabular" data-mnl>—</span>
      </footer>
    </main>

    <script type="module" src="/js/index.js"></script>
  </body>
</html>
