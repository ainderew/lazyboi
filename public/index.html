<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Logs of timekeeping</title>
    <link rel="stylesheet" href="./css/index.css" />
    <link rel="stylesheet" href="./css/jira.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="board-wrapper ticket-column element">
      <span class="colum-heading-text rounded">Priority</span>
      <!-- <div class="jira-ticket element"> -->
      <!--   <div class="ticket-header-container"> -->
      <!--     <span class="jira-ticket-key">REM-142</span> -->
      <!--     <span class="jira-ticket-status">To Do</span> -->
      <!--   </div> -->
      <!--   <span class="jira-ticket-name">Do Something Here</span> -->
      <!-- </div> -->
    </div>
    <div class="left-wrapper">
      <!-- <div class="jira-selected-container"></div> -->
      <div class="jira-tickets-list ticket-column element">
        <span class="colum-heading-text rounded">All Your Tickets</span>
        <!-- <div class="jira-ticket element"> -->
        <!--   <div class="ticket-header-container"> -->
        <!--     <span class="jira-ticket-key">REM-142</span> -->
        <!--     <span class="jira-ticket-status">To Do</span> -->
        <!--   </div> -->
        <!--   <span class="jira-ticket-name">Do Something Here</span> -->
        <!-- </div> -->
      </div>
    </div>

    <div class="right-wrapper">
      <div class="calendar-event-list">
        <div class="calendar-list-head element rounded">
          <div class="calendar-text-container">
            <span class="calendar-list-head-text">Meetings for today</span>
            <span class="calendar-list-head-subtext"
              >Last meeting of the day</span
            >
          </div>
          <span class="calendar-list-number"></span>
          <a class="google-login-container rounded" href="/auth/google">
            <img
              class="google-login-img"
              src="./assets/google-logo.svg"
              alt="google calendar logo"
            />
            Sign in with Google
          </a>
        </div>
      </div>
    </div>

    <div class="spotify-container">
      <div class="player-container element rounded">
        <div class="album-cover-container">
          <img
            class="album-cover-img"
            src="./assets/defaul-image-player.webp"
            alt="example"
          />
        </div>

        <a
          id="spotify-login-btn"
          class="btn-login-container rounded"
          href="/auth/spotify"
        >
          <img
            class="google-login-img"
            src="./assets/spotify-logo.svg"
            alt="google calendar logo"
          />
          Sign in with Spotify
        </a>

        <span class="player-song-title">...</span>
        <span class="player-song-artist">Artist Name</span>

        <div class="player-control-container">
          <!-- prev button -->
          <div class="btn-control-prev">
            <img
              class="control-btn-img"
              src="./assets/music_controls_svgs/next.svg"
              alt="previous song"
            />
          </div>
          <!-- play button -->
          <div class="btn-control-toggle-play">
            <img
              class="control-btn-img music-play-btn"
              src="./assets/music_controls_svgs/play.svg"
              alt="toggle play or pause song"
            />
          </div>
          <div class="btn-control-next">
            <img
              class="control-btn-img"
              src="./assets/music_controls_svgs/next.svg"
              alt="previous song"
            />
          </div>
        </div>
      </div>
    </div>

    <!-- <script src="https://sdk.scdn.co/spotify-player.js"></script> -->
    <script type="module" src="./js/calendar.js"></script>
    <script type="module" src="./js/spotify.js"></script>
    <script type="module" src="./js/jira.js"></script>
  </body>
</html>
